<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocumeSweeper</title>
  <link rel="stylesheet" href="./index.css"/>
  <script src="./libs/barcode.min.js"></script>
</head>
<body>
  <template id="menu-template">
    <div class="card-container"></div>
    <div class="card">
      <button class="add-new-card">+</button>
    </div>
    <svg id="testbar"></svg>
  </template>

  <template id="menu-card-template">
    <div class="back">
      <svg></svg>
      <button class="delete-card">X</button>
    </div>
    <div class="front">
      
    </div>
  </template>
  
  <template id="add-card-template">
    <div class="slide">
      <form>
        <button type="button" class="flip">↺</button>
        <div class="preview-card">
          <div class="front-content">
            <input name="title"/>
            <input name="subtitle"/>
          </div>
          <div class="back-content hidden">
            <svg class="card-back"></svg>
            <button class="open-camera">scatta</button>
          </div>
        </div>
        <div class="swatches">
          <input type="color" name="card-background"/>
          <input type="color" name="card-text"/>
          <input type="color" name="card-foreground"/>
        </div>
        <button type="submit" class="ok">ok</button>
        <button type="button" class="cancel-add-card">cancel</button>
      </form>
    </div>
  </template>

  <div id="main-outlet"></div>
  <script src="./index.js" type="module"></script>
</body>
</html>
