<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyShoppingCards</title>
  <link rel="icon" href="/assets/elefantino.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="./index.css"/>
  <script src="./libs/barcode.min.js"></script>
</head>
<body>
  <template id="menu-template">
    <div class="card-container"></div>
    <div class="card center">
      <button class="add-new-card">+</button>
    </div>
  </template>

  <template id="menu-card-template">
    <div class="back">
      <svg></svg>
      <button class="delete-card">✕</button>
      <div class="code"></div>
    </div>
    <div class="front">
      
    </div>
  </template>
  
  <template id="add-card-template">
    <div class="slide">
      <form>
        <div class="top-buttons">
          <button type="button" class="variant-card">v</button>
          <button type="button" class="flip-card">↺</button>
        </div>
        <div class="preview-card">
          <div class="front-content">
            <input name="title"/>
            <input name="subtitle"/>
          </div>
          <div class="back-content hidden">
            <svg class="card-back"></svg>
            <button class="open-camera">📷</button>
          </div>
        </div>
        <div class="swatches">
          <input type="color" name="card-background"/>
          <input type="color" name="card-text"/>
          <input type="color" name="card-foreground"/>
        </div>
        <div class="bottom-buttons">
          <button type="submit" class="ok">✓</button>
          <button type="button" class="cancel-add-card">✕</button>
        </div>
      </form>
    </div>
  </template>

  <div id="main-outlet"></div>
  <script src="./index.js" type="module"></script>
</body>
</html>
